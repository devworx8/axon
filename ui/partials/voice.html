  <!-- ── Voice ORB Fullscreen Overlay ──────────────────────────────── -->
  <div x-show="showVoiceOrb" x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[999] bg-slate-950/95 backdrop-blur-xl voice-command-center overflow-y-auto overflow-x-hidden"
       style="-webkit-overflow-scrolling: touch; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);"
       x-cloak>
    <button @click="closeVoiceCommandCenter(true)"
            class="absolute right-3 top-3 md:right-5 md:top-5 z-10 w-11 h-11 md:w-10 md:h-10 rounded-full bg-slate-900/70 text-slate-400 hover:text-white hover:bg-slate-800 flex items-center justify-center transition"
            style="padding-top: env(safe-area-inset-top);">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <div class="voice-stage min-h-full w-full px-4 py-6 md:px-10 md:py-12">
      <div class="voice-stage__backdrop"></div>

      <div class="voice-stage__content">
        <div class="text-center">
          <div class="voice-stage__eyebrow">Axon Voice Mode</div>
          <div class="voice-stage__provider mt-2 md:mt-3">
            <span class="voice-stage__provider-chip" x-text="consoleProviderIdentity().providerLabel"></span>
            <span class="voice-stage__provider-chip voice-stage__provider-chip--muted" x-text="consoleProviderIdentity().modelLabel"></span>
          </div>
        </div>

        <!-- ── Mobile: compact stacked layout ── -->
        <div class="md:hidden flex flex-col items-center gap-4 w-full">
          <!-- Reactor (compact on mobile) -->
          <div class="voice-visual-wrap-mobile">
            <!-- HUD: Scan Ring -->
            <div class="hud-scan-ring" x-show="hudScanActive" x-transition>
              <svg viewBox="0 0 460 460"><circle cx="230" cy="230" r="140" class="hud-scan-ring__track"/><circle cx="230" cy="230" r="140" class="hud-scan-ring__progress" :style="'stroke-dashoffset:' + (880 - (hudScanProgress / 100 * 880))"/></svg>
              <div class="hud-scan-label" x-text="hudScanLabel"></div>
            </div>
            <!-- HUD: Tool Badges -->
            <div class="hud-tools" x-show="hudActiveTools.length > 0">
              <template x-for="badge in hudActiveTools" :key="badge.id">
                <div class="hud-tool-badge"><span x-text="badge.icon"></span><span class="hud-tool-badge--name" x-text="badge.name"></span></div>
              </template>
            </div>
            <!-- HUD: Connection Beam -->
            <div class="hud-beam" x-show="hudConnectionBeam" x-transition>
              <div class="hud-beam__particle"></div><div class="hud-beam__particle"></div><div class="hud-beam__particle"></div>
              <div class="hud-beam__label" x-text="hudConnectionBeam"></div>
            </div>
            <svg class="axon-reactor" viewBox="0 0 420 420" role="img" aria-label="Axon voice reactor" :data-state="voiceVisualState()">
              <defs>
                <radialGradient id="axon-orb-core-m" cx="50%" cy="50%" r="60%">
                  <stop offset="0%" stop-color="#ffffff"></stop>
                  <stop offset="22%" stop-color="#dff8ff"></stop>
                  <stop offset="58%" stop-color="#46dbff"></stop>
                  <stop offset="100%" stop-color="#0a1630"></stop>
                </radialGradient>
                <linearGradient id="blade-fill-m" x1="0%" x2="100%" y1="0%" y2="100%">
                  <stop offset="0%" stop-color="#f7fbff"></stop>
                  <stop offset="16%" stop-color="#b9dbf7"></stop>
                  <stop offset="52%" stop-color="#2f6396"></stop>
                  <stop offset="100%" stop-color="#030d1f"></stop>
                </linearGradient>
                <linearGradient id="blade-edge-m" x1="0%" x2="100%" y1="0%" y2="0%">
                  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"></stop>
                  <stop offset="100%" stop-color="#7fdcff" stop-opacity="0.05"></stop>
                </linearGradient>
                <linearGradient id="beam-fill-m" x1="0%" x2="100%" y1="50%" y2="50%">
                  <stop offset="0%" stop-color="rgba(125,211,252,0)"></stop>
                  <stop offset="50%" stop-color="#8cf3ff"></stop>
                  <stop offset="100%" stop-color="rgba(125,211,252,0)"></stop>
                </linearGradient>
                <filter id="orb-glow-m" x="-200%" y="-200%" width="400%" height="400%">
                  <feGaussianBlur stdDeviation="18" result="blur"></feGaussianBlur>
                  <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
                </filter>
              </defs>
              <g class="reactor-rings">
                <circle class="reactor-ring" cx="210" cy="210" r="86" :style="voiceRingStyle(0)"></circle>
                <circle class="reactor-ring" cx="210" cy="210" r="112" :style="voiceRingStyle(1)"></circle>
                <circle class="reactor-ring" cx="210" cy="210" r="138" :style="voiceRingStyle(2)"></circle>
              </g>
              <g class="reactor-beams">
                <rect class="reactor-beam beam-left" x="118" y="292" width="182" height="10" rx="5" fill="url(#beam-fill-m)" :style="voiceBeamStyle(1)"></rect>
                <rect class="reactor-beam beam-right" x="118" y="292" width="182" height="10" rx="5" fill="url(#beam-fill-m)" :style="voiceBeamStyle(0.86)"></rect>
              </g>
              <g class="reactor-shell">
                <g class="reactor-blade reactor-blade--top">
                  <path d="M210 38 L270 198 L210 286 L150 198 Z" fill="url(#blade-fill-m)"></path>
                  <path d="M210 38 L270 198" stroke="url(#blade-edge-m)" stroke-width="3" fill="none"></path>
                  <path d="M210 38 L150 198" stroke="rgba(255,255,255,0.42)" stroke-width="2" fill="none"></path>
                </g>
                <g class="reactor-blade reactor-blade--left">
                  <path d="M66 334 L186 208 L170 348 Z" fill="url(#blade-fill-m)"></path>
                  <path d="M66 334 L186 208" stroke="url(#blade-edge-m)" stroke-width="3" fill="none"></path>
                </g>
                <g class="reactor-blade reactor-blade--right">
                  <path d="M354 334 L234 208 L250 348 Z" fill="url(#blade-fill-m)"></path>
                  <path d="M354 334 L234 208" stroke="url(#blade-edge-m)" stroke-width="3" fill="none"></path>
                </g>
              </g>
              <circle class="reactor-core-mask" cx="210" cy="210" r="65" fill="#000"
                      @click="toggleReactorOrbAction()" style="cursor:pointer;"/>
              <g class="reactor-core" filter="url(#orb-glow-m)">
                <circle class="reactor-orb-glow" cx="210" cy="210" r="70" :style="voiceGlowStyle()"></circle>
                <circle class="reactor-orb" cx="210" cy="210" r="52" fill="url(#axon-orb-core-m)"
                        @click="toggleReactorOrbAction()" style="cursor:pointer;"></circle>
                <circle class="reactor-orb-outline" cx="210" cy="210" r="58"></circle>
              </g>
            </svg>
          </div>

          <!-- Status (compact) -->
          <div class="text-center -mt-1">
            <div class="voice-stage__state-label-mobile" x-text="voiceStatusLabel()"></div>
            <div class="text-[11px] tracking-[0.12em] uppercase text-slate-500 mt-1" x-text="voiceStateCaption()"></div>
          </div>

          <!-- Transcript card -->
          <div class="w-full rounded-2xl border border-slate-800/60 bg-slate-900/50 p-3.5" style="backdrop-filter:blur(8px);">
            <div class="flex items-center gap-2 mb-2">
              <span class="w-1.5 h-1.5 rounded-full bg-slate-600 shrink-0" :class="voiceRecordingActive() ? 'bg-cyan-400 animate-pulse' : ''"></span>
              <span class="text-[10px] tracking-[0.2em] uppercase text-slate-500 font-semibold">Transcript</span>
            </div>
            <div class="text-sm text-slate-300 leading-relaxed min-h-[36px] max-h-[100px] overflow-y-auto" x-text="voiceDisplayTranscript()"></div>
          </div>

          <!-- Response card -->
          <div class="w-full rounded-2xl border border-cyan-500/15 bg-slate-900/60 p-3.5" style="backdrop-filter:blur(8px);"
               :class="voiceResponseAvailable() ? 'border-cyan-500/30' : ''">
            <div class="flex items-center gap-2 mb-2">
              <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="voiceResponseAvailable() ? 'bg-cyan-400 shadow-[0_0_6px_rgba(34,211,238,0.6)]' : 'bg-slate-600'"></span>
              <span class="text-[10px] tracking-[0.2em] uppercase font-semibold" :class="voiceResponseAvailable() ? 'text-cyan-400' : 'text-slate-500'">Response</span>
            </div>
            <div class="text-sm leading-relaxed min-h-[36px] max-h-[120px] overflow-y-auto"
                 :class="voiceResponseAvailable() ? 'text-slate-200' : 'text-slate-500'"
                 x-text="voiceDisplayResponse()"></div>
          </div>


        </div>

        <!-- ── Desktop: 3-column arena layout ── -->
        <div class="hidden md:block w-full">
        <div class="voice-arena">
          <!-- Left float: Transcript -->
          <div class="voice-float voice-float--left">
            <div class="voice-float__edge"></div>
            <div class="voice-float__inner">
              <div class="voice-float__label">
                <span class="voice-float__dot"></span>
                Transcript
              </div>
              <div class="voice-float__body" x-text="voiceDisplayTranscript()"></div>
            </div>
          </div>

          <!-- Center: Reactor + Status -->
          <div class="voice-arena__center">
            <div class="voice-visual-wrap">
          <div class="voice-hud voice-hud--left"></div>
          <div class="voice-hud voice-hud--right"></div>
          <!-- HUD: Scan Ring -->
          <div class="hud-scan-ring" x-show="hudScanActive" x-transition>
            <svg viewBox="0 0 460 460"><circle cx="230" cy="230" r="140" class="hud-scan-ring__track"/><circle cx="230" cy="230" r="140" class="hud-scan-ring__progress" :style="'stroke-dashoffset:' + (880 - (hudScanProgress / 100 * 880))"/></svg>
            <div class="hud-scan-label" x-text="hudScanLabel"></div>
          </div>
          <!-- HUD: Tool Badges -->
          <div class="hud-tools" x-show="hudActiveTools.length > 0">
            <template x-for="badge in hudActiveTools" :key="badge.id">
              <div class="hud-tool-badge"><span x-text="badge.icon"></span><span class="hud-tool-badge--name" x-text="badge.name"></span></div>
            </template>
          </div>
          <!-- HUD: Connection Beam -->
          <div class="hud-beam" x-show="hudConnectionBeam" x-transition>
            <div class="hud-beam__particle"></div><div class="hud-beam__particle"></div><div class="hud-beam__particle"></div>
            <div class="hud-beam__label" x-text="hudConnectionBeam"></div>
          </div>
          <svg class="axon-reactor" viewBox="0 0 420 420" role="img" aria-label="Axon voice reactor" :data-state="voiceVisualState()">
            <defs>
              <radialGradient id="axon-orb-core" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#ffffff"></stop>
                <stop offset="22%" stop-color="#dff8ff"></stop>
                <stop offset="58%" stop-color="#46dbff"></stop>
                <stop offset="100%" stop-color="#0a1630"></stop>
              </radialGradient>
              <linearGradient id="blade-fill" x1="0%" x2="100%" y1="0%" y2="100%">
                <stop offset="0%" stop-color="#f7fbff"></stop>
                <stop offset="16%" stop-color="#b9dbf7"></stop>
                <stop offset="52%" stop-color="#2f6396"></stop>
                <stop offset="100%" stop-color="#030d1f"></stop>
              </linearGradient>
              <linearGradient id="blade-edge" x1="0%" x2="100%" y1="0%" y2="0%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"></stop>
                <stop offset="100%" stop-color="#7fdcff" stop-opacity="0.05"></stop>
              </linearGradient>
              <linearGradient id="beam-fill" x1="0%" x2="100%" y1="50%" y2="50%">
                <stop offset="0%" stop-color="rgba(125,211,252,0)"></stop>
                <stop offset="50%" stop-color="#8cf3ff"></stop>
                <stop offset="100%" stop-color="rgba(125,211,252,0)"></stop>
              </linearGradient>
              <filter id="orb-glow" x="-200%" y="-200%" width="400%" height="400%">
                <feGaussianBlur stdDeviation="18" result="blur"></feGaussianBlur>
                <feMerge>
                  <feMergeNode in="blur"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>

            <g class="reactor-rings">
              <circle class="reactor-ring" cx="210" cy="210" r="86" :style="voiceRingStyle(0)"></circle>
              <circle class="reactor-ring" cx="210" cy="210" r="112" :style="voiceRingStyle(1)"></circle>
              <circle class="reactor-ring" cx="210" cy="210" r="138" :style="voiceRingStyle(2)"></circle>
            </g>

            <g class="reactor-beams">
              <rect class="reactor-beam beam-left" x="118" y="292" width="182" height="10" rx="5" fill="url(#beam-fill)" :style="voiceBeamStyle(1)"></rect>
              <rect class="reactor-beam beam-right" x="118" y="292" width="182" height="10" rx="5" fill="url(#beam-fill)" :style="voiceBeamStyle(0.86)"></rect>
            </g>

            <g class="reactor-shell">
              <g class="reactor-blade reactor-blade--top">
                <path d="M210 38 L270 198 L210 286 L150 198 Z" fill="url(#blade-fill)"></path>
                <path d="M210 38 L270 198" stroke="url(#blade-edge)" stroke-width="3" fill="none"></path>
                <path d="M210 38 L150 198" stroke="rgba(255,255,255,0.42)" stroke-width="2" fill="none"></path>
              </g>
              <g class="reactor-blade reactor-blade--left">
                <path d="M66 334 L186 208 L170 348 Z" fill="url(#blade-fill)"></path>
                <path d="M66 334 L186 208" stroke="url(#blade-edge)" stroke-width="3" fill="none"></path>
              </g>
              <g class="reactor-blade reactor-blade--right">
                <path d="M354 334 L234 208 L250 348 Z" fill="url(#blade-fill)"></path>
                <path d="M354 334 L234 208" stroke="url(#blade-edge)" stroke-width="3" fill="none"></path>
              </g>
            </g>

            <circle class="reactor-core-mask" cx="210" cy="210" r="65" fill="#000"
                    @click="toggleReactorOrbAction()" style="cursor:pointer;"/>
            <g class="reactor-core" filter="url(#orb-glow)">
              <circle class="reactor-orb-glow" cx="210" cy="210" r="70" :style="voiceGlowStyle()"></circle>
              <circle class="reactor-orb" cx="210" cy="210" r="52" fill="url(#axon-orb-core)"
                      @click="toggleReactorOrbAction()" style="cursor:pointer;"></circle>
              <circle class="reactor-orb-outline" cx="210" cy="210" r="58"></circle>
            </g>
          </svg>
        </div>

        <div class="voice-stage__status text-center">
          <div class="voice-stage__state-label" x-text="voiceStatusLabel()"></div>
          <div class="voice-stage__state-caption" x-text="voiceStateCaption()"></div>
          <div class="voice-stage__state-hint" x-text="voiceStatusHint()"></div>
          <div x-show="voiceSessionStartedAt" class="voice-stage__started" x-text="'Started ' + timeAgo(voiceSessionStartedAt)"></div>
        </div>
          </div><!-- /voice-arena__center -->

          <!-- Right float: Response -->
          <div class="voice-float voice-float--right" :class="voiceResponseAvailable() ? 'voice-float--active' : ''">
            <div class="voice-float__edge"></div>
            <div class="voice-float__scanline"></div>
            <div class="voice-float__inner">
              <div class="voice-float__label">
                <span class="voice-float__dot voice-float__dot--cyan"></span>
                Response
              </div>
              <div class="voice-float__body voice-float__body--response" x-text="voiceDisplayResponse()"></div>
            </div>
          </div>
        </div><!-- /voice-arena -->


        </div>

      </div>

      <!-- ── HUD: Terminal Pull-up ── -->
      <template x-if="hudTerminalVisible">
        <div class="hud-terminal" :class="hudTerminalVisible ? '' : 'hud-terminal--closing'">
          <div class="hud-terminal__scanline"></div>
          <div class="hud-terminal__header">
            <span class="hud-terminal__dot"></span>
            <span class="hud-terminal__title" x-text="hudTerminalTitle || 'Terminal'"></span>
          </div>
          <div class="hud-terminal__body">
            <template x-for="(line, i) in hudTerminalLines" :key="i">
              <div class="hud-terminal__line" :class="i === hudTerminalLines.length - 1 ? 'hud-terminal__line--new' : ''" x-text="line"></div>
            </template>
            <span class="hud-terminal__cursor"></span>
          </div>
        </div>
      </template>

      <!-- ── HUD: Approval Gate Overlay ── -->
      <template x-if="hudApprovalPending">
        <div class="hud-approval">
          <div class="hud-approval__card">
            <div class="hud-approval__header">
              <div class="hud-approval__icon">⚠</div>
              <div class="hud-approval__title">Approval Required</div>
            </div>
            <div class="hud-approval__body" x-text="hudApprovalDetail || 'Axon needs your permission to proceed.'"></div>
            <div class="hud-approval__actions">
              <button class="hud-approval__btn hud-approval__btn--deny" @click="hudDismissApproval()">Deny</button>
              <button class="hud-approval__btn hud-approval__btn--approve" @click="hudDismissApproval()">Approve</button>
            </div>
          </div>
        </div>
      </template>
    </div>
    </div>
  </div>
