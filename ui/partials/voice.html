            </div>
            <div x-show="voiceFileViewer.error" class="voice-file-viewer__error" x-text="voiceFileViewer.error"></div>
            <template x-if="voiceFileViewer.type === 'pdf' && !voiceFileViewer.loading">
              <iframe :src="voiceFileViewerUrl()" class="voice-file-viewer__iframe"></iframe>
            </template>
            <template x-if="voiceFileViewer.type === 'image' && !voiceFileViewer.loading">
              <img :src="voiceFileViewerUrl()" :alt="voiceFileName()" class="voice-file-viewer__image">
            </template>
            <template x-if="voiceFileViewer.type === 'video' && !voiceFileViewer.loading">
              <video :src="voiceFileViewerUrl()" controls class="voice-file-viewer__video"></video>
            </template>
            <template x-if="voiceFileViewer.type === 'audio' && !voiceFileViewer.loading">
              <div class="voice-file-viewer__audio-wrap">
                <audio :src="voiceFileViewerUrl()" controls class="w-full"></audio>
              </div>
            </template>
            <template x-if="(voiceFileViewer.type === 'code' || voiceFileViewer.type === 'text') && !voiceFileViewer.loading && !voiceFileViewer.error">
              <pre class="voice-file-viewer__code"><code x-html="voiceFileViewer.content"></code></pre>
            </template>
          </div>
        </div>
      </div>
    </template>

    </div>
  </div>
