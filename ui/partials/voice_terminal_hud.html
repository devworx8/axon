      <template x-if="hudTerminalVisible">
        <div class="hud-terminal" :class="interactiveTerminalPreferred('voice') ? 'hud-terminal--interactive' : ''">
          <div class="hud-terminal__scanline"></div>
          <div class="hud-terminal__header">
            <span class="hud-terminal__dot"></span>
            <span class="hud-terminal__title" x-text="hudTerminalTitle || 'Terminal'"></span>
          </div>

          <template x-if="interactiveTerminalRenderable('voice')">
            <div class="hud-terminal__body">
              <div class="axon-terminal-stage axon-terminal-stage--voice">
                <div class="axon-terminal-stage__chrome">
                  <div>
                    <div class="axon-terminal-stage__eyebrow">Voice dock</div>
                    <div class="axon-terminal-stage__title" x-text="terminalViewportSessionLabel('voice')"></div>
                  </div>
                  <div class="axon-terminal-stage__chips">
                    <span class="axon-terminal-stage__chip"
                          :class="terminalViewportConnected('voice') ? 'axon-terminal-stage__chip--live' : (terminalViewportError('voice') ? 'axon-terminal-stage__chip--fallback' : 'axon-terminal-stage__chip--boot')"
                          x-text="terminalViewportStatusLabel('voice')"></span>
                  </div>
                </div>
                <div class="axon-terminal-stage__frame">
                  <div class="axon-terminal-stage__screen">
                    <div x-ref="voiceXtermMount" class="axon-xterm-shell axon-xterm-shell--voice"></div>
                    <div class="axon-terminal-stage__overlay" x-show="!terminalViewportConnected('voice') || terminalViewportError('voice')" x-transition.opacity>
                      <div class="axon-terminal-stage__overlay-title" x-text="terminalViewportOverlayTitle('voice')"></div>
                      <div class="axon-terminal-stage__overlay-copy" x-text="terminalViewportOverlayDetail('voice')"></div>
                    </div>
                  </div>
                </div>
                <div class="axon-terminal-stage__footer">
                  <div class="axon-terminal-stage__hint" x-text="terminalViewportCaption('voice')"></div>
                  <div class="axon-terminal-stage__actions">
                    <button class="axon-terminal-stage__action" @click="focusInteractiveTerminalViewport('voice')">Focus</button>
                    <button class="axon-terminal-stage__action" @click="copyInteractiveTerminalViewport('voice')">Copy</button>
                  </div>
                </div>
                <div class="axon-terminal-stage__telemetry" x-show="voiceOperatorTraceLines(3).length">
                  <template x-for="(line, index) in voiceOperatorTraceLines(3)" :key="index">
                    <div class="axon-terminal-stage__telemetry-line" x-text="line"></div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <template x-if="!interactiveTerminalRenderable('voice')">
            <div class="hud-terminal__body hud-terminal__body--fallback">
              <div class="hud-terminal__line hud-terminal__line--new" x-show="terminalViewportError('voice')" x-text="terminalViewportError('voice')"></div>
              <template x-for="(line, i) in hudTerminalLines" :key="i">
                <div class="hud-terminal__line" :class="i === hudTerminalLines.length - 1 ? 'hud-terminal__line--new' : ''" x-text="line"></div>
              </template>
              <span class="hud-terminal__cursor"></span>
            </div>
          </template>
          <div x-effect="syncInteractiveTerminalViewport('voice')"></div>
        </div>
      </template>
