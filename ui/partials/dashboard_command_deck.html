<section class="workspace-console-panel rounded-[28px] border border-slate-800 bg-gradient-to-br from-slate-950 via-slate-900/92 to-slate-900/70 p-5 shadow-[0_24px_80px_rgba(15,23,42,0.45)] backdrop-blur md:p-6">
  <div class="flex flex-col gap-5">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div class="min-w-0">
        <div class="workspace-console-kicker">J.A.R.V.I.S Tactical Console</div>
        <h2 class="mt-3 text-2xl font-bold text-white sm:text-3xl">
          <span x-text="'Command Deck - ' + missionWorkspaceLabel()"></span>
        </h2>
        <p class="mt-2 text-sm leading-6 text-slate-400">Launch the immersive console, keep the live operator in sight, and steer the current workspace like a control room instead of a generic chat feed.</p>
        <div class="workspace-console-chip-row mt-3">
          <span class="workspace-console-chip" x-text="runtimeStatus.runtime_label || backendBadge()"></span>
          <span class="workspace-console-chip" x-text="missionPostureLabel()"></span>
          <span class="workspace-console-chip" x-text="activeWorkspaceRunCount() === 1 ? '1 active run' : `${activeWorkspaceRunCount()} active runs`"></span>
        </div>
      </div>
      <div class="flex flex-col items-end gap-2">
        <span class="rounded-full border px-2.5 py-1 text-[10px] uppercase tracking-[0.18em]"
              :class="phaseChipClass(liveOperator.phase || 'observe')"
              x-text="phaseLabel(liveOperator.phase || 'observe')"></span>
        <div class="text-[11px] text-slate-400" x-text="currentWorkspaceRunActive() ? 'Active run in progress' : 'Standing by'"></div>
      </div>
    </div>

    <div class="grid gap-2 sm:grid-cols-2">
      <button @click="switchTab('chat')" class="workspace-console-btn primary">
        Launch JARVIS Console
      </button>
      <button @click="quickResume()" :disabled="!canQuickResume()" class="workspace-console-btn">
        Resume last run
      </button>
      <button @click="runChatQuickAction({ action: 'check_approvals', prompt: 'Check pending approvals and tell me what is blocked.' })"
              class="workspace-console-btn">
        Check approvals
      </button>
      <button @click="ensureWorkspacePreview({ openExternal: true, attachBrowser: false })"
              :disabled="!missionWorkspaceId()"
              class="workspace-console-btn">
        <span x-text="previewReadyForCurrentWorkspace() ? 'Open preview' : 'Start preview'"></span>
      </button>
      <button @click="runScan()" :disabled="scanning" class="workspace-console-btn">
        <span x-text="scanning ? 'Scanning...' : 'Run Axon Scan'"></span>
      </button>
      <button @click="stopWorkspaceRun()" :disabled="!currentWorkspaceRunActive()" class="workspace-console-btn danger">
        Stop run
      </button>
    </div>

    <div class="workspace-console-telemetry-grid">
      <div class="workspace-console-telemetry-card">
        <div class="workspace-console-telemetry-label">Selected lane</div>
        <div class="workspace-console-telemetry-value" x-text="runtimeStatus.runtime_label || backendBadge()"></div>
      </div>
      <div class="workspace-console-telemetry-card">
        <div class="workspace-console-telemetry-label">Primary workspace</div>
        <div class="workspace-console-telemetry-value" x-text="missionWorkspaceLabel()"></div>
      </div>
      <div class="workspace-console-telemetry-card">
        <div class="workspace-console-telemetry-label">Target hint</div>
        <div class="workspace-console-telemetry-value" x-text="consoleWorkspaceTargetHint()"></div>
      </div>
    </div>

    <div class="grid gap-3 md:grid-cols-2">
      <div class="rounded-2xl border border-blue-500/20 bg-blue-500/5 px-4 py-3">
        <div class="flex items-center justify-between gap-2">
          <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500">Current focus</div>
          <span class="h-2 w-2 rounded-full shrink-0"
                :class="liveOperator.active ? 'bg-emerald-400 animate-pulse' : 'bg-slate-600'"></span>
        </div>
        <div class="mt-2 text-sm font-medium text-slate-100" x-text="liveOperator.title || lastOperatorOutcome.title || 'Standing by'"></div>
        <div class="mt-1 text-[11px] leading-5 text-slate-400" x-text="liveOperator.detail || lastOperatorOutcome.summary || 'The next visible action appears here as soon as Axon starts working.'"></div>
        <div x-show="liveOperator.workspaceName || chatProject?.name" class="mt-2 text-[10px] text-blue-400/70" x-text="'Workspace: ' + (liveOperator.workspaceName || chatProject?.name)"></div>
      </div>

      <div class="rounded-2xl border border-cyan-500/15 bg-slate-950/60 px-4 py-3">
        <div class="flex items-center justify-between gap-2">
          <div class="text-[10px] uppercase tracking-[0.18em] text-slate-500">Proof of work</div>
          <span class="rounded-full border px-2 py-0.5 text-[9px] uppercase tracking-[0.18em]"
                :class="phaseChipClass(liveOperator.phase || agentProgressState || 'observe')"
                x-text="phaseLabel(liveOperator.phase || agentProgressState || 'observe')"></span>
        </div>
        <div class="mt-2 text-sm font-medium text-slate-100" x-text="lastOperatorOutcome.tool ? prettyToolName(lastOperatorOutcome.tool) : 'Waiting for the next action'"></div>
        <div class="mt-1 text-[11px] leading-5 text-slate-400" x-text="lastOperatorOutcome.summary || 'The latest verified result lands here so you can see proof that work really happened.'"></div>
        <div class="mt-2 flex items-center justify-between text-[10px] text-slate-500">
          <span x-text="liveOperator.startedAt ? 'Started ' + timeAgo(liveOperator.startedAt) : 'Ready now'"></span>
          <span class="truncate max-w-[140px]" x-text="liveOperator.workspaceName || chatProject?.name || dashboardWeakestWorkspace()?.name || 'Global'"></span>
        </div>
      </div>
    </div>
  </div>
</section>
