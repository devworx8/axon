          <div
            x-show="vercelDeployGuidanceVisible()"
            x-transition
            class="mt-2 rounded-2xl border border-amber-500/20 bg-amber-500/5 p-3"
          >
            <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
              <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-2">
                  <span class="text-[10px] font-semibold uppercase tracking-[0.18em] text-amber-300">Vercel Deploy Lane</span>
                  <span
                    class="rounded-full border px-2 py-0.5 text-[10px] font-medium"
                    :class="vercelDeployLaneReady() ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-200' : 'border-amber-500/30 bg-amber-500/10 text-amber-200'"
                    x-text="vercelDeployLaneReady() ? 'Ready' : 'Needs setup'"
                  ></span>
                </div>
                <p class="mt-2 text-xs leading-5 text-slate-300" x-text="vercelDeployGuidanceSummary()"></p>
                <div class="mt-3 flex flex-wrap gap-2">
                  <template x-for="check in vercelDeployLaneChecks()" :key="check.id">
                    <span
                      class="rounded-full border px-2.5 py-1 text-[10px] font-medium"
                      :class="check.ready ? 'border-emerald-500/25 bg-emerald-500/10 text-emerald-200' : 'border-slate-700 bg-slate-900/70 text-slate-300'"
                      x-text="`${check.label}: ${check.detail}`"
                    ></span>
                  </template>
                </div>
              </div>

              <div class="flex flex-wrap gap-2 lg:justify-end">
                <button
                  x-show="!vercelDeployLaneReady()"
                  @click="prepareVercelDeployLane()"
                  :disabled="deployLanePreparing"
                  class="rounded-xl border border-amber-400/30 bg-amber-500/10 px-3 py-2 text-xs font-semibold text-amber-100 transition hover:bg-amber-500/15 disabled:opacity-50"
                  x-text="deployLanePreparing ? 'Arming deploy lane...' : 'Prepare deploy lane'"
                ></button>

                <button
                  x-show="vercelDeployLaneReady()"
                  @click="draftVercelDeployPrompt('deploy')"
                  class="rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-3 py-2 text-xs font-semibold text-emerald-100 transition hover:bg-emerald-500/15"
                >
                  Draft deploy prompt
                </button>
              </div>
            </div>
          </div>
