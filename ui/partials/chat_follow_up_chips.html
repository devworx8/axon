      <!-- Follow-up suggestion chips -->
      <div x-effect="syncFollowUpSuggestions()" x-show="followUpSuggestions.length && !chatLoading" class="shrink-0 px-3 md:px-5 pt-2">
        <div class="console-followup-rail flex flex-wrap gap-2">
          <template x-for="(suggestion, sIdx) in followUpSuggestions" :key="sIdx">
            <button type="button"
                    @click="useSuggestion(suggestion)"
                    :class="suggestion === '→ Continue'
                      ? 'console-followup-chip console-followup-chip-continue'
                      : 'console-followup-chip console-followup-chip-command'"
                    class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-xs transition-all duration-200 cursor-pointer">
              <span :class="suggestion === '→ Continue' ? 'text-amber-400' : 'text-blue-400'" x-text="suggestion === '→ Continue' ? '▶' : '→'"></span>
              <span x-text="suggestion"></span>
            </button>
          </template>
        </div>
      </div>
