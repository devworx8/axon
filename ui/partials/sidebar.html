  <!-- ── Sidebar — hidden on mobile, visible md+ ──────────────────── -->
  <aside class="hidden md:flex w-56 shrink-0 flex-col bg-slate-900 border-r border-slate-800">
    <!-- Identity block — Axon brand + current user -->
    <div class="px-4 pt-4 pb-3 border-b border-slate-800">
      <div class="flex items-center gap-2.5 mb-3">
        <div class="relative">
          <div class="w-9 h-9 rounded-[13px] bg-gradient-to-br from-sky-400 via-blue-600 to-cyan-300 flex items-center justify-center text-slate-950 font-black text-base shadow-lg shadow-cyan-500/25 border border-white/10">✦</div>
          <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border border-slate-900"
               :class="liveFeed.connected ? 'bg-emerald-400' : 'bg-slate-600'"></div>
        </div>
        <div>
          <div class="font-bold text-white text-sm tracking-tight">Axon</div>
          <div class="text-[10px] text-cyan-400/70 uppercase tracking-[0.22em]">Operator</div>
        </div>
      </div>
      <!-- Current user chip -->
      <div x-show="currentUser.name" class="flex items-center gap-2 rounded-xl border border-slate-800 bg-slate-950/60 px-2.5 py-1.5">
        <div class="w-5 h-5 rounded-lg bg-gradient-to-br from-violet-500 to-blue-600 flex items-center justify-center text-white text-[9px] font-bold shrink-0"
             x-text="(currentUser.name || 'U').charAt(0).toUpperCase()"></div>
        <div class="min-w-0 flex-1">
          <div class="truncate text-[11px] font-medium text-slate-200" x-text="currentUser.name || 'Local Operator'"></div>
          <div class="text-[9px] text-slate-500 uppercase tracking-[0.16em]" x-text="currentUser.role || 'operator'"></div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-3 px-2 space-y-0.5 overflow-y-auto">
      <template x-for="item in navItems" :key="item.id">
        <button
          @click="switchTab(item.id)"
          :class="activeTab === item.id ? 'bg-blue-600/20 text-blue-400 border-l-2 border-blue-500' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200 border-l-2 border-transparent'"
          class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-all text-left"
        >
          <span x-text="item.icon" class="text-base"></span>
          <span x-text="item.label"></span>
          <!-- Mission badges: active (blue) + urgent/high (red) -->
          <template x-if="item.id === 'tasks'">
            <span class="ml-auto flex items-center gap-1">
              <span x-show="tasks.filter(t => t.status === 'in_progress').length > 0"
                    class="bg-blue-500 text-white text-[9px] font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center animate-pulse"
                    x-text="tasks.filter(t => t.status === 'in_progress').length"
                    title="Active missions"></span>
              <span x-show="urgentCount > 0"
                    class="bg-red-500 text-white text-[9px] font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center"
                    x-text="urgentCount"
                    title="High priority missions"></span>
            </span>
          </template>
        </button>
      </template>
    </nav>

    <!-- Bottom: scan + settings -->
    <div class="border-t border-slate-800 px-2 py-3 space-y-1">
      <!-- Usage badge -->
      <div x-show="usage.calls > 0"
           class="flex items-center justify-between px-3 py-1.5 text-[10px] text-slate-600 border border-slate-800 rounded-lg">
        <span>🧮 <span x-text="usage.tokens.toLocaleString()"></span> tokens</span>
        <span x-show="usage.cost_usd > 0" class="text-slate-500">
          $<span x-text="usage.cost_usd.toFixed(4)"></span>
        </span>
        <span x-show="usage.cli_calls > 0 && usage.cost_usd === 0" class="text-green-600 text-[10px]">CLI ✓</span>
      </div>
      <!-- Terminal quick-access -->
      <button @click="activeTab = 'chat'; toggleTerminalMode(true)"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-amber-400/80 hover:bg-slate-800 hover:text-amber-300 transition border border-amber-500/10 bg-amber-500/5">
        <span>⌨️</span><span>Terminal</span>
        <span class="ml-auto text-[10px] text-amber-500/60 uppercase tracking-wider">Safe</span>
      </button>
      <button @click="runScan()" :disabled="scanning"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-slate-200 transition disabled:opacity-40">
        <span x-text="scanning ? '⏳' : '🔄'"></span>
        <span x-text="scanning ? 'Scanning...' : 'Axon Scan'"></span>
      </button>
      <button @click="showMobileModal = true; loadMobileInfo()"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-slate-200 transition">
        <span>📱</span><span>Mobile</span>
      </button>
      <a href="/manual" target="_blank"
         class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-slate-200 transition">
        <span>📖</span><span>Manual</span>
      </a>
      <button @click="activeTab = 'settings'; loadSettings()"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-slate-200 transition">
        <span>⚙️</span><span>Settings</span>
      </button>
    </div>
  </aside>
