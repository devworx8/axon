      <div x-show="currentPendingAgentApproval()" class="shrink-0 px-3 md:px-5 pb-2">
        <div class="rounded-2xl border border-amber-500/25 bg-amber-500/8 px-4 py-3">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-amber-300 text-sm">⚠️</span>
                <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-amber-200">Approval Required</div>
              </div>
              <div class="mt-2 text-sm text-slate-100" x-text="currentPendingAgentApproval()?.message || 'Axon is waiting for approval.'"></div>
              <div x-show="currentPendingAgentApproval()?.workspaceName" class="mt-1 text-[11px] text-slate-400" x-text="'Workspace: ' + currentPendingAgentApproval().workspaceName"></div>
            </div>
            <span class="rounded-full border border-amber-500/20 bg-slate-950/60 px-2.5 py-1 text-[10px] text-amber-200"
                  x-text="currentPendingAgentApproval()?.summary || 'Review action'"></span>
          </div>
          <div x-show="approvalCommandPreview(currentPendingAgentApproval())"
               class="mt-3 rounded-xl border border-amber-500/20 bg-slate-950/70 px-3 py-2 font-mono text-[11px] text-amber-200 break-all"
               x-text="approvalCommandPreview(currentPendingAgentApproval())"></div>
          <div x-show="currentPendingAgentApproval()?.draftCommitMessage"
               class="mt-2 text-[11px] text-slate-300">
            Draft commit:
            <span class="font-mono text-slate-100" x-text="currentPendingAgentApproval()?.draftCommitMessage"></span>
          </div>
          <div class="mt-3 flex flex-wrap gap-2">
            <button @click="approvePendingAgentAction('once')"
                    :disabled="approvalActionBusy"
                    class="rounded-xl bg-emerald-600/20 border border-emerald-500/30 px-3 py-2 text-[11px] font-semibold text-emerald-300 transition hover:bg-emerald-600/30 disabled:opacity-50">
              <span x-text="approvalActionBusy ? 'Approving…' : 'Approve once'"></span>
            </button>
            <button x-show="approvalSupportsScope(currentPendingAgentApproval(), 'session')"
                    @click="approvePendingAgentAction('session')"
                    :disabled="approvalActionBusy"
                    class="rounded-xl border border-blue-500/20 bg-blue-500/10 px-3 py-2 text-[11px] font-semibold text-blue-200 transition hover:bg-blue-500/15 disabled:opacity-50">
              Approve for session
            </button>
            <button @click="dismissPendingAgentApproval()"
                    :disabled="approvalActionBusy"
                    class="rounded-xl border border-slate-700 bg-slate-950/60 px-3 py-2 text-[11px] text-slate-300 transition hover:border-slate-500 disabled:opacity-50">
              Dismiss
            </button>
          </div>
        </div>
      </div>
