      <div x-show="currentPendingAgentApproval()" class="shrink-0 px-3 md:px-5 pb-2">
        <div class="approval-prompt">
          <div class="approval-prompt__header">
            <div class="min-w-0">
              <div class="approval-prompt__eyebrow">Permission prompt</div>
              <div class="approval-prompt__title" x-text="approvalPromptTitle(currentPendingAgentApproval())"></div>
              <div class="approval-prompt__body" x-text="approvalPromptBody(currentPendingAgentApproval())"></div>
            </div>
            <span class="approval-prompt__chip"
                  x-text="approvalPromptChipLabel(currentPendingAgentApproval())"></span>
          </div>
          <div class="approval-prompt__meta"
               x-show="approvalPromptMeta(currentPendingAgentApproval())"
               x-text="approvalPromptMeta(currentPendingAgentApproval())"></div>
          <div class="approval-prompt__preview"
               x-show="approvalCommandPreview(currentPendingAgentApproval())"
               x-text="approvalCommandPreview(currentPendingAgentApproval())"></div>
          <div class="mt-2 text-[11px] text-slate-400"
               x-show="currentPendingAgentApproval()?.draftCommitMessage">
            Draft commit:
            <span class="font-mono text-slate-100" x-text="currentPendingAgentApproval()?.draftCommitMessage"></span>
          </div>
          <div class="approval-prompt__actions">
            <button @click="approvePendingAgentAction('once')"
                    :disabled="approvalActionBusy"
                    class="approval-prompt__btn approval-prompt__btn--approve">
              <span x-text="approvalActionBusy ? 'Allowing…' : approvalPromptActionLabel('once', currentPendingAgentApproval())"></span>
            </button>
            <button x-show="approvalSupportsScope(currentPendingAgentApproval(), 'session')"
                    @click="approvePendingAgentAction('session')"
                    :disabled="approvalActionBusy"
                    class="approval-prompt__btn">
              <span x-text="approvalPromptActionLabel('session', currentPendingAgentApproval())"></span>
            </button>
            <button @click="dismissPendingAgentApproval()"
                    :disabled="approvalActionBusy"
                    class="approval-prompt__btn approval-prompt__btn--deny">
              Deny
            </button>
          </div>
        </div>
      </div>
