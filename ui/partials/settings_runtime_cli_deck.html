          <section x-show="settingsSection === 'runtime'"
                   x-init="refreshRuntimeCliDeck?.()"
                   class="rounded-[28px] border border-slate-800/90 bg-slate-950/90 p-5 shadow-[0_22px_70px_rgba(2,6,23,0.45)] space-y-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="text-[11px] uppercase tracking-[0.28em] text-slate-500">CLI Identity</div>
                <div class="mt-2 text-lg font-semibold text-white">Codex + Claude sign-in control</div>
                <div class="mt-1 text-sm text-slate-400">Drive install, login, polling, and sign-out from the settings deck without dropping to the shell.</div>
              </div>
              <button @click="refreshRuntimeCliDeck?.(true)"
                      class="rounded-2xl border border-slate-700 bg-slate-950/60 px-3 py-2 text-xs font-medium text-slate-300 transition hover:border-slate-500 hover:text-white">
                Refresh CLI auth
              </button>
            </div>

            <div x-show="runtimeCliDeck?.error" class="rounded-2xl border border-amber-500/20 bg-amber-500/10 px-4 py-3 text-xs text-amber-200" x-text="runtimeCliDeck.error"></div>

            <div class="grid gap-4 xl:grid-cols-2">
              <template x-for="card in runtimeCliCards()" :key="card.id">
                <article class="rounded-[24px] border border-slate-800 bg-slate-900/55 p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div>
                      <div class="flex items-center gap-2">
                        <div class="text-sm font-semibold text-white" x-text="card.label"></div>
                        <span class="rounded-full px-2 py-0.5 text-[9px] uppercase tracking-[0.18em]"
                              :class="card.accent === 'cyan' ? 'border border-cyan-500/25 bg-cyan-500/10 text-cyan-200' : 'border border-emerald-500/25 bg-emerald-500/10 text-emerald-200'"
                              x-text="card.badge"></span>
                      </div>
                      <div class="mt-1 text-[11px] text-slate-500" x-text="card.loggedIn ? 'Authenticated and ready for Axon operator work.' : (card.installed ? 'Installed locally. Sign in to unlock runtime use.' : 'Install the CLI locally before signing in.')"></div>
                    </div>
                    <span class="rounded-full border px-2.5 py-1 text-[9px] uppercase tracking-[0.18em]"
                          :class="card.loggedIn ? 'border-emerald-500/25 bg-emerald-500/10 text-emerald-200' : (card.installed ? 'border-amber-500/25 bg-amber-500/10 text-amber-200' : 'border-slate-700 bg-slate-950/70 text-slate-400')"
                          x-text="card.loggedIn ? 'Signed in' : (card.installed ? 'Needs sign-in' : 'Missing')"></span>
                  </div>

                  <div class="mt-3 grid gap-2 sm:grid-cols-3">
                    <div class="rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2">
                      <div class="text-[10px] uppercase tracking-[0.16em] text-slate-500">Binary</div>
                      <div class="mt-1 text-xs font-medium text-slate-100" x-text="card.binaryName"></div>
                    </div>
                    <div class="rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2">
                      <div class="text-[10px] uppercase tracking-[0.16em] text-slate-500">Version</div>
                      <div class="mt-1 text-xs font-medium text-slate-100" x-text="card.version"></div>
                    </div>
                    <div class="rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2">
                      <div class="text-[10px] uppercase tracking-[0.16em] text-slate-500">Auth</div>
                      <div class="mt-1 text-xs font-medium" :class="card.loggedIn ? 'text-emerald-200' : 'text-amber-200'" x-text="card.authMessage"></div>
                    </div>
                  </div>

                  <div class="mt-3 rounded-xl border border-slate-800 bg-slate-950/60 px-3 py-2 text-[11px] text-slate-400">
                    <div class="text-[10px] uppercase tracking-[0.16em] text-slate-500">Selected environment</div>
                    <div class="mt-1 font-mono break-all text-slate-300" x-text="card.selectedPath"></div>
                  </div>

                  <div x-show="card.waiting || card.sessionMessage || card.userCode" class="mt-3 rounded-xl border border-cyan-500/20 bg-cyan-500/10 px-3 py-3 space-y-2">
                    <div class="flex items-center justify-between gap-3">
                      <div class="text-[10px] uppercase tracking-[0.2em] text-cyan-200">Guided sign-in</div>
                      <span class="text-[10px] text-cyan-100" x-text="card.session?.status || 'waiting'"></span>
                    </div>
                    <div class="text-xs text-slate-200" x-text="card.sessionMessage || 'Axon is waiting for the browser login flow to complete.'"></div>
                    <div x-show="card.userCode" class="rounded-lg border border-slate-800 bg-slate-950/70 px-3 py-2 text-xs font-mono text-cyan-100" x-text="card.userCode"></div>
                    <div class="flex flex-wrap gap-2">
                      <button @click="runtimeCliOpenAuthLink(card.id)"
                              :disabled="!card.browserUrl"
                              class="rounded-xl border border-cyan-500/25 bg-cyan-500/10 px-3 py-2 text-xs font-medium text-cyan-200 transition hover:bg-cyan-500/15 disabled:opacity-40">
                        Open sign-in page
                      </button>
                      <button @click="cancelRuntimeCliLogin(card.id)"
                              :disabled="card.busy === 'cancel'"
                              class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 transition hover:border-slate-500 disabled:opacity-40">
                        <span x-text="card.busy === 'cancel' ? 'Cancelling…' : 'Cancel sign-in'"></span>
                      </button>
                    </div>
                  </div>

                  <div x-show="card.error" class="mt-3 rounded-xl border border-rose-500/20 bg-rose-500/10 px-3 py-2 text-xs text-rose-200" x-text="card.error"></div>

                  <div class="mt-4 flex flex-wrap gap-2">
                    <button @click="refreshRuntimeCliFamily(card.id)"
                            :disabled="card.loading"
                            class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 transition hover:border-slate-500 disabled:opacity-40">
                      <span x-text="card.loading ? 'Refreshing…' : 'Refresh'"></span>
                    </button>
                    <button @click="installRuntimeCli(card.id)"
                            :disabled="card.busy === 'install' || card.installed"
                            class="rounded-xl border border-cyan-500/25 bg-cyan-500/10 px-3 py-2 text-xs font-medium text-cyan-200 transition hover:bg-cyan-500/15 disabled:opacity-40">
                      <span x-text="card.busy === 'install' ? 'Installing…' : 'Install'"></span>
                    </button>
                    <button @click="startRuntimeCliLogin(card.id)"
                            :disabled="card.busy === 'login' || !card.installed || card.waiting || card.loggedIn"
                            class="rounded-xl border border-emerald-500/25 bg-emerald-500/10 px-3 py-2 text-xs font-medium text-emerald-200 transition hover:bg-emerald-500/15 disabled:opacity-40">
                      <span x-text="card.busy === 'login' ? 'Starting…' : 'Sign in'"></span>
                    </button>
                    <button @click="logoutRuntimeCli(card.id)"
                            :disabled="card.busy === 'logout' || !card.loggedIn"
                            class="rounded-xl border border-rose-500/25 bg-rose-500/10 px-3 py-2 text-xs font-medium text-rose-200 transition hover:bg-rose-500/15 disabled:opacity-40">
                      <span x-text="card.busy === 'logout' ? 'Signing out…' : 'Sign out'"></span>
                    </button>
                  </div>

                  <div class="mt-3 flex flex-wrap gap-2">
                    <button @click="copyRuntimeCliCommand(card.installCommand, card.label + ' install command copied')"
                            :disabled="!card.installCommand"
                            class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 transition hover:border-slate-500 disabled:opacity-40">
                      Copy install command
                    </button>
                    <button @click="copyRuntimeCliCommand(card.loginCommand, card.label + ' login command copied')"
                            :disabled="!card.loginCommand"
                            class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 transition hover:border-slate-500 disabled:opacity-40">
                      Copy login command
                    </button>
                    <button @click="copyRuntimeCliCommand(card.statusCommand, card.label + ' status command copied')"
                            :disabled="!card.statusCommand"
                            class="rounded-xl border border-slate-700 px-3 py-2 text-xs font-medium text-slate-200 transition hover:border-slate-500 disabled:opacity-40">
                      Copy status command
                    </button>
                  </div>
                </article>
              </template>
            </div>
          </section>
