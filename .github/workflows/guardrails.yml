name: Axon Guardrails

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: File size guardrails
        run: python3 scripts/guardrails/check_file_sizes.py

      - name: Boundary guardrails
        run: python3 scripts/guardrails/check_boundaries.py
